function parseDate(tgl,jam){
  const months={"Jan":0,"Feb":1,"Mar":2,"Apr":3,"May":4,"Jun":5,"Jul":6,"Aug":7,"Sep":8,"Oct":9,"Nov":10,"Dec":11};
  const p=tgl.split(" ");
  return new Date(parseInt(p[2]),months[p[1]],parseInt(p[0]),...jam.split(":").map(Number));
}
function fmt(n){return "Rp "+n.toLocaleString("id-ID")}

const sorted=[...raw].sort((a,b)=>parseDate(a.tgl,a.jam)-parseDate(b.tgl,b.jam));

let totalTopup=0,totalPakai=0;
sorted.forEach(r=>{
  const key=r.tgl+" "+r.jam;
  const n=(r.tipe==="Top Up (+)"?nominals["Top Up (+)"]:nominals["Pemakaian (-)"])[key]||0;
  if(r.tipe==="Top Up (+)")totalTopup+=n; else totalPakai+=n;
});
const saldoAwal=38800;
document.getElementById("s-awal").textContent=fmt(saldoAwal);
document.getElementById("s-topup").textContent=fmt(totalTopup);
document.getElementById("s-pakai").textContent=fmt(totalPakai);
document.getElementById("s-saldo").textContent=fmt(saldoAwal+totalTopup-totalPakai);

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const f=document.getElementById("filter").value;
  const rv=document.getElementById("revFilter").value;
  let rows=sorted.filter(r=>{
    const mQ=!q||r.desc.toLowerCase().includes(q)||r.tgl.toLowerCase().includes(q);
    const mF=!f||r.tipe.includes(f);
    const mR=rv!=="rev"||(r.revisi&&r.revisi.length>0);
    return mQ&&mF&&mR;
  });
  const tbody=document.getElementById("tbody");
  const empty=document.getElementById("empty");
  if(!rows.length){tbody.innerHTML="";empty.style.display="block";}
  else{
    empty.style.display="none";
    let no=1;
    tbody.innerHTML=rows.map(r=>{
      const key=r.tgl+" "+r.jam;
      const n=(r.tipe==="Top Up (+)"?nominals["Top Up (+)"]:nominals["Pemakaian (-)"])[key]||0;
      const isTopUp=r.tipe==="Top Up (+)";
      const isDel=r.revisi==="Dihapus";
      const badge=isTopUp
        ?`<span class="badge topup">Top Up (+)</span>`
        :`<span class="badge pakai">Pemakaian (-)</span>`;
      const nomStr=isTopUp
        ?`<span style="color:#0F6E56">+${fmt(n)}</span>`
        :`<span style="color:#993C1D">-${fmt(n)}</span>`;
      let revCell=`<span style="color:var(--color-text-secondary);font-size:12px">—</span>`;
      if(r.revisi==="Dihapus"){
        revCell=`<span class="del-badge"><i class="ti ti-trash" style="font-size:12px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>Dihapus</span>`;
      } else if(r.revisi){
        revCell=`<span class="rev-badge"><i class="ti ti-alert-triangle" style="font-size:12px;vertical-align:-1px;margin-right:4px" aria-hidden="true"></i>${r.revisi}</span>`;
      }
      const rowClass=isDel?"deleted":"";
      return `<tr class="${rowClass}"><td>${no++}</td><td>${r.tgl}</td><td>${r.jam}</td><td title="${r.desc}">${r.desc}</td><td>${badge}</td><td class="num">${nomStr}</td><td>${revCell}</td></tr>`;
    }).join("");
  }
  document.getElementById("count").textContent=rows.length+" dari "+sorted.length+" transaksi";
}
render();
</script>
